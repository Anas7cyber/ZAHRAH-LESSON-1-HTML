<!DOCTYPE html>
<html>
    <head>
      <style>
        img#cryaboutit {
            float:right;
        }
        img#WOMPWOMP {
            float: left;
        }
      </style>
    </head>
    <body>
        <h2> FLOAT RIGHT </h2>
        <p> In this example, the image will float to the right in the paragraph, and the text in the paragraph
 wil wrap around the image </p>
          
        <p>
            <img id="cryaboutit" src="cryaboutit.jpg" style="width: 100px; height: 100px;">
            <img id="WOMPWOMP" src="WOMPWOMP.jpg" style="width: 100px; height: 100px;">
            This is dummy content used to understand float property
            
        </p>
    </body>
</html>
