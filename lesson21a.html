<!DOCTYPE html>
<html>
 <body>
    
    <h2>JavaScript Objects and their properties</h2>

    <p> There are two different ways to access an object property</p>

    <p>You can use .property or ["property"].</p>
    <p id="demo">
        <script>
            // create an object:
            var person = {
                FirstName: "Zahrah",
                age: "12",
            };

            // Display some data from the object
            document.getElementById("demo").innerHTML = "My name is "  + person.FirstName + " and I am " + person.age + " years old.";
        </script>
    </p>
</body>
</html>
