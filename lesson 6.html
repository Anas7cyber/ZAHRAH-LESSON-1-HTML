<!DOCTYPE html>
<html>
    <head>
        <title>Forms in HTML</title>
    </head>
    <body>
       <h1>Personal details Form</h1>
      <form>
        <label>Name</label><br>
        <input type="text" id="Name"><br><br>
         <label>Email ID</label><br>
         <input type="text" id="email"><br><br>
         <label>Contact Number (This wil be hiden)</label><br>
         <input type="password" id="contact"><br><br>
         <label>Gender</label><br>
         <input type="radio" id="female" name="gender" value="Female">Female<br>
         <input type="radio" id="male" name="gender" value="Male">Male<br>
         <label>Favorite City</label><br>
         <input type="checkbox" id="city" Name="New Dehli">New Dehli<br>
         <input type="checkbox" id="city" Name="Mumbai">Mumbai<br><br>
         <label>Birthday:</label>
         <input type="date" id="birthday" Name="birthday"><br><br>
         <label>Select subject</label>  
         <select name="Subject" id="subject">
            <option value="Maths">Maths</option>
            <option value="English">English</option>
            <option value="Science">Science</option>
         </select>
         <br>
         <br>
         <input type="submit"> 
      </form> 
    </body>
</html>
