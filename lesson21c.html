<!DOCTYPE html>
<html>
    <body>

        <p> Finding the largest number with the help of Argument Objects</p>
        <p id="result"></p>
        <script>
            function findMax() {
                var i;
                var max = 0;
                for (i=0; i < arguments.length; i++) {
                    if (arguments[i] > max) {
                        max = arguments[i];
                    }
                }
                return max;
            }

            document.getElementById("result").innerHTML = findMax( 6, 7, 1, 8);
        </script>

    </body>
</html>
