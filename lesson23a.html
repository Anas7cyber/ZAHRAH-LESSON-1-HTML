<!DOCTYPE html>
<html>
    <head>
        <title>MY ZOO</title>
    <style>
         body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightgreen ;
            text-align: center;
            padding: 30px;
         }

         h1 {
            color: #008000;
         }

         #zoo {
            border: 2px solid #d87093;
            width: 300px;
            margin: 16px auto;
            padding: 12px;
            border-radius: 10px;
            background: pink;
         }

         .zone {
            border: 1px solid #ee82ee;
            margin: 6px 0;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            text-align: left;
         }

         button {
            background: skyblue;
            color: lightskyblue;
            padding: 10 24px;
            border:none;
            border-radius: 20px;
            cursor: pointer;
         }
         
     </style>
    </head>
    <body>

    <h1>MY ZOO</h1>
    <p> Use JavaScript and the DOM to add animals to each cage</p>

    <!--
       DOM Tree: zoo is the parent element node.
       Zone divs are child element nodes. Animal names inside each span are text nodes.
    -->
       <div id="zoo">
         <div class="zone">Zone 1: <span id="zone1"></span></div>
         <div class="zone">Zone 2: <span id="zone2"></span></div>
         <div class="zone">Zone 3: <span id="zone3"></span></div>
         <div class="zone">Total Animals: <span id="total"></span></div>
        </div>


         <br>

        <button onclick="openZoo()">Open the Zoo!</button>
     
        <p id="zoo-status"></p>

        <script>

            function openZoo() {
                /* Task 1: Add your first animal to Zone 1 */
                document.getElementById("zone1").innerHTML = "Lion";

                /* Task 2: Add your second animal to Zone 2 */
                document.getElementById("zone2").innerHTML = "Elephant";

                /* Task 3: Add your third animal to Zone 3 */
                document.getElementById("zone3").innerHTML = "Penguin";

                /* Task 4: Show the total number of animals */
                document.getElementById("total").innerHTML = "3";

                /* Task 5: Change the zoo background colour */
                 document.getElementById("zoo").style.backgroundColor = "lightgreen";

                /* Task 6: Use the document object to show the page title */
                document.getElementById("zoo-status").innerHTML = document.title + " is now open!";

            }

        </script>
        </body>
</html>
